version: "3.9"

services:

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage
    environment:
      QDRANT__TELEMETRY_DISABLED: "true"
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped

  embedding-service:
    build: ./embedding-service
    ports:
      - "8001:8001"
    depends_on:
      - qdrant
    restart: unless-stopped

  llm-service:
    build: ./llm-service
    ports:
      - "8002:8002"
    depends_on:
      - ollama
      - redis
    restart: unless-stopped

  rag-service:
    build: ./rag-service
    ports:
      - "8003:8003"
    depends_on:
      - embedding-service
      - llm-service
      - redis
    environment:
      - LLM_SERVICE_URL=http://llm-service:8002/generate
      - VECTOR_SERVICE_URL=http://embedding-service:8001
    restart: unless-stopped

  ingestion-service:
    build: ./ingestion-service
    ports:
      - "8004:8004"
    depends_on:
      - embedding-service
    restart: unless-stopped

  ui-service:
    build: ./ui-service
    ports:
      - "8000:8000"
    depends_on:
      - rag-service
      - ingestion-service
    restart: unless-stopped
    
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  ollama:
  redis_data: