<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<title>AI Knowledge Assistant</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

    <div class="header">
        <h1>AI Knowledge Assistant</h1>
        <div class="status">RAG System</div>
    </div>

    <div id="chat" class="chat"></div>

    <div class="sources" id="sources"></div>

    <div class="input-area">

        <input
            type="text"
            id="question"
            placeholder="Введите вопрос..."
        >

        <button onclick="sendQuestion()">Отправить</button>

    </div>

    <div class="upload">

        <input type="file" id="file">

        <button onclick="uploadFile()">
            Загрузить документ
        </button>

    </div>

</div>

<script>

const session_id = "session_" + Math.random().toString(36).substring(7);

const chat = document.getElementById("chat");
const sourcesDiv = document.getElementById("sources");

function addMessage(role, text){

    const div = document.createElement("div");

    div.className = role;

    div.innerText = text;

    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;
}

async function sendQuestion(){

    const input = document.getElementById("question");

    const question = input.value;

    if(!question) return;

    addMessage("user", "User: " + question);

    input.value = "";

    const formData = new FormData();

    formData.append("question", question);

    const response = await fetch("/ask",{
        method:"POST",
        body:formData
    });

    const data = await response.json();

    addMessage("ai", "AI: " + data.answer);

    showSources(data.sources);
}

function showSources(sources){

    sourcesDiv.innerHTML = "";

    if(!sources || sources.length === 0) return;

    const title = document.createElement("h3");
    title.innerText = "Источники";

    sourcesDiv.appendChild(title);

    sources.forEach(s=>{

        const item = document.createElement("div");

        item.className = "source";

        item.innerHTML =
            "<b>"+s.filename+"</b><br>"+
            "Score: "+s.score.toFixed(2)+"<br>"+
            "<small>"+s.text+"</small>";

        sourcesDiv.appendChild(item);
    });
}

async function uploadFile(){

    const fileInput = document.getElementById("file");

    const file = fileInput.files[0];

    if(!file) return;

    const formData = new FormData();

    formData.append("file", file);

    const resp = await fetch("/upload",{
        method:"POST",
        body:formData
    });

    const data = await resp.json();

    alert("Документ загружен");
}

document.getElementById("question")
.addEventListener("keypress",function(e){

    if(e.key === "Enter"){
        sendQuestion();
    }

});

</script>

</body>
</html>
